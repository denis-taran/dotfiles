name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - run: |
          files=".bashrc .bash_profile .profile $(shfmt -f .)"
          shellcheck -e SC1091 $files
          shfmt -d $files
