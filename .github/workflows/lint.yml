name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - run: |
          files=".bashrc .bash_profile .profile $(shfmt -f .)"
          shellcheck -e SC1091 $files
          shfmt -d $files
